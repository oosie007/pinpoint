<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="pnpt-popup-header">
    <h1>Pinpoint</h1>
    <p id="header-subtitle">Visual feedback for prototypes</p>
  </header>

  <section id="screen-auth" class="pnpt-screen active">
    <p class="pnpt-msg">Sign in with a magic link sent to your email.</p>
    <div class="pnpt-error" id="auth-config-error" hidden></div>
    <label class="pnpt-label" for="auth-email">Email</label>
    <input class="pnpt-input" type="email" id="auth-email" placeholder="you@company.com" autocomplete="email">
    <div class="pnpt-error" id="auth-error" hidden></div>
    <button class="pnpt-btn" id="auth-send-btn" type="button">Send magic link</button>
  </section>

  <section id="screen-check-email" class="pnpt-screen">
    <p class="pnpt-msg">Check your email and click the magic link. It should open this extension popup and sign you in here (not the dashboard).</p>
    <button class="pnpt-btn secondary" id="auth-back-btn">Use a different email</button>
  </section>

  <section id="screen-home" class="pnpt-screen">
    <p class="pnpt-msg" id="home-greeting">Your prototypes</p>
    <ul class="pnpt-proto-list" id="proto-list"></ul>
    <button class="pnpt-btn" id="add-proto-btn">+ Add prototype</button>
    <button class="pnpt-btn secondary" id="sign-out-btn">Sign out</button>
  </section>

  <section id="screen-add-proto" class="pnpt-screen">
    <div class="pnpt-nav-row">
      <button class="pnpt-btn link" id="add-back-btn">← Back</button>
    </div>
    <label class="pnpt-label" for="proto-name">Name</label>
    <input class="pnpt-input" id="proto-name" placeholder="Marketing site v2">
    <label class="pnpt-label" for="proto-url">Prototype URL</label>
    <input class="pnpt-input" type="url" id="proto-url" placeholder="https://preview.example.com">
    <div class="pnpt-error" id="add-error" hidden></div>
    <button class="pnpt-btn" id="create-proto-btn">Create prototype</button>
  </section>

  <section id="screen-proto-detail" class="pnpt-screen">
    <div class="pnpt-nav-row">
      <button class="pnpt-btn link" id="detail-back-btn">← Prototypes</button>
    </div>
    <h2 id="detail-name" style="font-size:15px;margin-bottom:4px;"></h2>
    <p class="pnpt-msg" id="detail-url"></p>
    <button class="pnpt-btn" id="open-proto-btn">Open prototype</button>
    <label class="pnpt-label" style="margin-top:12px;">Invite collaborator</label>
    <input class="pnpt-input" type="email" id="invite-email" placeholder="collaborator@email.com">
    <button class="pnpt-btn secondary" id="invite-btn">Send invite link</button>
    <div class="pnpt-invite-box" id="invite-link-box" hidden></div>
    <button class="pnpt-btn secondary" id="detail-settings-btn">Settings</button>
  </section>

  <section id="screen-settings" class="pnpt-screen">
    <div class="pnpt-nav-row">
      <button class="pnpt-btn link" id="settings-back-btn">← Prototype</button>
    </div>
    <div class="pnpt-toggle-row">
      <label for="toggle-team-feedback">Show all team feedback on page</label>
      <input type="checkbox" id="toggle-team-feedback">
    </div>
    <div class="pnpt-toggle-row">
      <label for="toggle-upvotes">Allow upvotes on feedback</label>
      <input type="checkbox" id="toggle-upvotes">
    </div>
    <button class="pnpt-btn" id="save-settings-btn">Save settings</button>
  </section>

  <script src="popup.js"></script>
</body>
</html>
